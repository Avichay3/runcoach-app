name: Build Android APK

# Builds an installable APK in the cloud — no Android Studio needed.
# Run it manually from the Actions tab, or it runs on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk RunCoach.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunCoach-APK
          path: RunCoach.apk
          if-no-files-found: error

      # Publish a permanent, public, direct-download link (no login, no zip)
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: RunCoach Android (latest)
          body: הגרסה האחרונה של אפליקציית RunCoach לאנדרואיד. הורד את RunCoach.apk והתקן.
          files: RunCoach.apk
